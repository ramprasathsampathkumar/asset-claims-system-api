openapi: 3.0.3
info:
  title: Asset Claims API
  description: Production-ready asset claims submission API
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Claims
  - name: Chat
  - name: Documents
  - name: Health
  - name: Store Locator
    description: Public store/branch/ATM finder — no authentication required

paths:

  # ── Store Locator ────────────────────────────────────────────────────────────

  /api/store-locator/config:
    get:
      tags: [Store Locator]
      summary: Get map display configuration
      description: Returns the map tile style URL, default centre coordinates, default zoom level, and attribution string consumed by the frontend map component.
      operationId: getStoreLocatorConfig
      responses:
        "200":
          description: Map configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreLocatorConfig"
              example:
                styleUrl: "https://tiles.openfreemap.org/styles/liberty"
                defaultCenter: { lat: 39.8283, lng: -98.5795 }
                defaultZoom: 4
                attribution: "© OpenFreeMap © OpenStreetMap contributors"

  /api/store-locator/filters:
    get:
      tags: [Store Locator]
      summary: Get available filter options
      description: Returns the dropdown options for store type, services, and search radius that the UI renders in its filter panel.
      operationId: getStoreLocatorFilters
      responses:
        "200":
          description: Filter options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreLocatorFilters"

  /api/store-locator/stores:
    get:
      tags: [Store Locator]
      summary: List all stores
      description: |
        Returns all 16 seed store locations. `distance` is always `0` (no origin
        coordinates are supplied). `openNow` is computed from the store's local
        timezone at the time of the request.
      operationId: listStores
      responses:
        "200":
          description: Array of all store locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreWithDistance"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/store-locator/stores/{storeId}:
    get:
      tags: [Store Locator]
      summary: Get a single store by ID
      description: Returns the store matching the given URL-safe ID. `distance` is `0` because no origin coordinates are provided on this endpoint.
      operationId: getStoreById
      parameters:
        - name: storeId
          in: path
          required: true
          description: URL-safe store identifier (e.g. `nyc-001`)
          schema:
            type: string
            example: "nyc-001"
      responses:
        "200":
          description: Store found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreWithDistance"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: "Store not found."
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/store-locator/search:
    post:
      tags: [Store Locator]
      summary: Search and filter stores
      description: |
        Main search endpoint. All request fields are optional — omitting everything
        returns all stores sorted alphabetically.

        **Server-side geocoding and automatic radius expansion**

        The frontend never geocodes text queries itself. When `query` is provided
        without `latitude`/`longitude`, the backend geocodes the query using the
        Nominatim (OpenStreetMap) API and uses the resolved coordinates as the
        search origin. Once coordinates are resolved the text filter is dropped
        (spatial filtering handles locality).

        **Radius behaviour when no `radiusKm` is provided:**
        The backend automatically expands the search radius until results are found:
        1. Try **25 km**
        2. If empty → try **50 km**
        3. If empty → try **100 km**
        4. If still empty → fall back to plain text match against store fields

        **Radius behaviour when `radiusKm` is explicitly provided:**
        The given radius is used exactly — no auto-expansion.

        **When `latitude`/`longitude` are provided directly** (device GPS via "Use My Location"),
        geocoding is skipped entirely. Any `query` text is applied as an additional
        text filter on top of the radius. `radiusKm` defaults to no limit if omitted.

        If geocoding returns no result at all, the search falls back to plain text
        matching (radius filter skipped).

        **Filtering rules:**
        - `query` — case-insensitive substring match against name, city, state, postal code, and street address
        - `storeTypes` — store must match **one** of the supplied types (OR within the array)
        - `services` — store must offer **all** of the supplied services (AND logic)
        - `radiusKm` — applied only when coordinates are available (from client or geocoding)
        - `openNow: true` — includes only stores that are currently open in their local timezone

        **Sorting:**
        - When coordinates are available: sorted by Haversine distance ascending
        - Otherwise: sorted alphabetically by store name
      operationId: searchStores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreSearchRequest"
            examples:
              nearby_branches:
                summary: Branches within 25 km of Manhattan with wire transfer
                value:
                  latitude: 40.7128
                  longitude: -74.0060
                  radiusKm: 25
                  storeTypes: [branch]
                  services: [wire_transfer]
              city_text_search:
                summary: All stores in Chicago
                value:
                  query: "Chicago"
              open_atms:
                summary: ATMs that are open right now
                value:
                  storeTypes: [atm]
                  openNow: true
      responses:
        "200":
          description: Matching stores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSearchResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/upload:
    post:
      tags: [Documents]
      summary: Upload a document (PDF, DOC, DOCX, PNG, JPG — max 10 MB)
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: true
              properties:
                file:
                  type: string
                  description: The file to upload (binary)
                uploadedBy:
                  type: string
                  description: Optional identifier of the uploader (e.g. user ID or email)
                referenceNumber:
                  type: string
                  description: Optional claim reference number for traceability (e.g. ACL-XXXXX-XXXX)
                  example: "ACL-M5X2K1-AB3C"
                documentType:
                  type: string
                  description: Optional UI-supplied document label (e.g. passport, bank_statement, proof_of_address)
                  example: "bank_statement"
      responses:
        "201":
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentUploadResponse"
        "400":
          description: Validation failed (bad file type, size exceeded, missing file)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/by-claim:
    post:
      tags: [Documents]
      summary: List documents for a specific claim (identity-verified)
      description: |
        Verifies identity using referenceNumber + lastName (same as /api/inquiry),
        then returns only documents linked to that claim reference number.
        Returns 404 if the claim is not found or the lastName does not match.
      operationId: listClaimDocuments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimDocumentRequest"
      responses:
        "200":
          description: Documents belonging to the verified claim
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimDocumentListResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Claim not found or identity verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents:
    get:
      tags: [Documents]
      summary: List all uploaded documents
      operationId: listDocuments
      responses:
        "200":
          description: List of document metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{id}/download:
    get:
      tags: [Documents]
      summary: Download a document by ID
      operationId: downloadDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content with appropriate Content-Type
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{id}:
    delete:
      tags: [Documents]
      summary: Delete a document by ID
      operationId: deleteDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Document deleted successfully
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db:
                    type: string
                  timestamp:
                    type: string

  /api/inquiry:
    post:
      tags: [Claims]
      summary: Inquire about an existing claim status
      operationId: inquireClaim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimInquiry"
      responses:
        "200":
          description: Claim found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
        "404":
          description: Claim not found or details do not match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/chat:
    post:
      tags: [Chat]
      summary: Send a chat message to the AI claims assistant
      description: |
        Multi-turn conversational interface powered by Claude (claude-haiku-4-5-20251001) with
        MCP tool integration. The assistant can look up claim status, list documents, and answer
        questions about a specific claim after verifying the user's identity.

        Pass the full conversation history on every request to maintain context across turns.
        The `referenceNumber` and `lastName` are injected into the system prompt so the
        assistant can verify identity before acting on any claim data.

        **Note:** this endpoint is handled outside the OpenAPI router and performs its own
        input validation; schema validation is for documentation purposes only.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            example:
              message: "What is the status of my claim?"
              referenceNumber: "ACL-M5X2K1-AB3C"
              lastName: "Smith"
              history:
                - role: "user"
                  content: "Hello"
                - role: "assistant"
                  content: "Hello! How can I help you with your asset claim today?"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
              example:
                reply: "Your claim ACL-M5X2K1-AB3C is currently in SUBMITTED status, submitted on 2026-03-01."
        "400":
          description: Missing required field (message, referenceNumber, or lastName)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"
        "500":
          description: Anthropic API error or unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatErrorResponse"

  /api/submit:
    post:
      tags: [Claims]
      summary: Submit an asset claim
      operationId: submitClaim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSubmission"
      responses:
        "200":
          description: Claim submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:

    ChatRequest:
      type: object
      required: [message, referenceNumber, lastName]
      properties:
        message:
          type: string
          description: The user's latest message
          example: "What is the status of my claim?"
        referenceNumber:
          type: string
          description: Claim reference number used to scope the assistant's context
          example: "ACL-M5X2K1-AB3C"
        lastName:
          type: string
          description: Last name of the claimant for identity verification
          example: "Smith"
        history:
          type: array
          description: |
            Prior conversation turns in chronological order (oldest first).
            Omit or send an empty array for the first message in a session.
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
          description: Who sent this message
        content:
          type: string
          description: Text content of the message
          example: "Hello, I need help with my claim."

    ChatResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
          description: The assistant's natural language response
          example: "Your claim ACL-M5X2K1-AB3C is currently in SUBMITTED status."

    ChatErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "referenceNumber is required."

    ClaimInquiry:
      type: object
      description: |
        Claim inquiry request. All field validation (required, format, pattern)
        is enforced in application code to allow locale-aware error messages.
      properties:
        referenceNumber:
          type: string
          description: Reference number returned at claim submission (format ACL-XXXXXX-XXXX)
          example: "ACL-M5X2K1-AB3C"
        lastName:
          type: string
          description: Last name of the claimant as submitted
          example: "Doe"
        dateOfBirth:
          type: string
          description: Optional date of birth for extra identity verification (YYYY-MM-DD)
          example: "1985-06-15"
        locale:
          type: string
          description: BCP 47 language tag for localised error messages
          example: "en"

    InquiryResponse:
      type: object
      required: [success, referenceNumber, status]
      properties:
        success:
          type: boolean
        referenceNumber:
          type: string
          example: "ACL-M5X2K1-AB3C"
        status:
          type: string
          description: Current claim status
          example: "SUBMITTED"
        locale:
          type: string
          example: "en"
        submittedAt:
          type: string
          description: ISO 8601 timestamp of when the claim was submitted
          example: "2026-03-01T10:30:00Z"
        assetType:
          type: string
          description: Type of asset claimed
          example: "stock"
        currency:
          type: string
          description: Requested payment currency
          example: "USD"
        createdAt:
          type: string
          description: ISO 8601 timestamp of record creation
        updatedAt:
          type: string
          description: ISO 8601 timestamp of last update

    ClaimSubmission:
      type: object
      required: [locale, submittedAt, step1, step2, step3, step4]
      properties:
        locale:
          type: string
          description: BCP 47 language tag
          example: "en"
        submittedAt:
          type: string
          format: date-time
          description: ISO 8601 submission timestamp
          example: "2026-03-01T10:30:00Z"
        step1:
          $ref: "#/components/schemas/Step1"
        step2:
          $ref: "#/components/schemas/Step2"
        step3:
          $ref: "#/components/schemas/Step3"
        step4:
          $ref: "#/components/schemas/Step4"

    Step1:
      type: object
      required: [confirmed]
      properties:
        confirmed:
          type: boolean
          description: Must be true to proceed

    Step2:
      type: object
      required:
        - firstName
        - lastName
        - dateOfBirth
        - nationality
        - idType
        - idNumber
        - street1
        - city
        - postalCode
        - country
        - phone
        - email
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        dateOfBirth:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: "1985-06-15"
        nationality:
          type: string
          minLength: 1
        idType:
          type: string
          enum: [passport, national_id, drivers_license, residence_permit, other]
        idNumber:
          type: string
          minLength: 1
        street1:
          type: string
          minLength: 1
        street2:
          type: string
        city:
          type: string
          minLength: 1
        stateProvince:
          type: string
        postalCode:
          type: string
          minLength: 1
        country:
          type: string
          pattern: '^[A-Z]{2}$'
          example: "US"
        phone:
          type: string
          pattern: '^\+[1-9]\d{1,14}$'
          example: "+12125551234"
        email:
          type: string

    # step3 — discriminated union (assetType).
    # Vert.x validates this as an open object; assetType discrimination
    # is enforced in application code (Step3Validator).
    Step3:
      type: object
      required: [assetType]
      description: |
        Asset details. The assetType field drives which other fields are required:
        - stock / etf: tickerSymbol, exchange, sharesOwned
        - bond: isin, faceValue, maturityDate
        - mutual_fund: fundName, fundCode, unitsHeld
        - crypto: cryptoExchange, cryptoAccountId, cryptoAssetSymbol, cryptoAmount
        - savings: bankName, savingsAccountNumber, savingsBalance
      properties:
        assetType:
          type: string
          enum: [stock, etf, bond, mutual_fund, crypto, savings]
        tickerSymbol:
          type: string
        isin:
          type: string
          pattern: '^[A-Z]{2}[A-Z0-9]{9}[0-9]$'
        exchange:
          type: string
        sharesOwned:
          type: string
          pattern: '^\d+(\.\d+)?$'
        faceValue:
          type: string
          pattern: '^\d+(\.\d+)?$'
        maturityDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        fundName:
          type: string
        fundCode:
          type: string
        unitsHeld:
          type: string
          pattern: '^\d+(\.\d+)?$'
        cryptoExchange:
          type: string
        cryptoAccountId:
          type: string
        cryptoAssetSymbol:
          type: string
        cryptoAmount:
          type: string
          pattern: '^\d+(\.\d+)?$'
        bankName:
          type: string
        savingsAccountNumber:
          type: string
        savingsBalance:
          type: string
          pattern: '^\d+(\.\d+)?$'
      additionalProperties: true

    Step4:
      type: object
      required: [currency, bankFields]
      properties:
        currency:
          type: string
          enum: [USD, EUR, GBP, JPY, AUD, CAD, CHF, CNH, HKD, NZD]
          description: |
            Payment currency. The required `bankFields` depend on this value:
            - **USD** → `account_number` (4–17 digits), `routing_number` (9 digits)
            - **EUR** → `iban` (valid IBAN), `bic` (optional BIC/SWIFT)
            - **GBP** → `sort_code` (DD-DD-DD), `account_number` (8 digits)
            - **JPY** → `bank_code` (4 digits), `branch_code` (3 digits), `account_number` (7 digits)
            - **AUD** → `bsb` (6 digits, dash optional), `account_number` (6–10 digits)
            - **CAD** → `institution_number` (3 digits), `transit_number` (5 digits), `account_number` (7–12 digits, optional)
            - **CHF** → `iban` (CH + 2 check + 5 bank + 12 account = 21 chars), `swift` (optional)
            - **CNH** → `account_number` (10–20 digits), `bank_name`, `swift` (optional)
            - **HKD** → `bank_code` (3 digits), `account_number` (6–12 digits), `swift` (optional)
            - **NZD** → `bank_code` (2 digits), `branch_code` (4 digits), `account_number` (7 digits), `suffix` (2–3 digits)
        bankFields:
          type: object
          additionalProperties: true
          description: >
            Currency-specific bank account fields. Required keys and formats are
            validated server-side based on the selected `currency`. See the
            `BankFields_*` schemas below for the exact structure per currency.

    # ── Per-currency bankFields schemas (documentation + Swagger UI) ─────────

    BankFields_USD:
      type: object
      title: "USD Bank Fields"
      description: Required fields when currency is USD
      required: [account_number, routing_number]
      properties:
        account_number:
          type: string
          pattern: '^\d{4,17}$'
          description: 4 to 17 digits
          example: "123456789"
        routing_number:
          type: string
          pattern: '^\d{9}$'
          description: Exactly 9 digits (ABA routing number)
          example: "021000021"

    BankFields_EUR:
      type: object
      title: "EUR Bank Fields"
      description: Required fields when currency is EUR
      required: [iban]
      properties:
        iban:
          type: string
          pattern: '^[A-Z]{2}\d{2}[A-Z0-9]{4,30}$'
          description: Valid IBAN (minimum 4 alphanumeric chars after check digits)
          example: "DE89370400440532013000"
        bic:
          type: string
          pattern: '^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: BIC / SWIFT code (optional)
          example: "COBADEFFXXX"

    BankFields_GBP:
      type: object
      title: "GBP Bank Fields"
      description: Required fields when currency is GBP
      required: [sort_code, account_number]
      properties:
        sort_code:
          type: string
          pattern: '^\d{2}-\d{2}-\d{2}$'
          description: "Format: DD-DD-DD"
          example: "40-30-20"
        account_number:
          type: string
          pattern: '^\d{8}$'
          description: Exactly 8 digits
          example: "12345678"

    BankFields_JPY:
      type: object
      title: "JPY Bank Fields"
      description: Required fields when currency is JPY
      required: [bank_code, branch_code, account_number]
      properties:
        bank_code:
          type: string
          pattern: '^\d{4}$'
          description: Exactly 4 digits
          example: "0001"
        branch_code:
          type: string
          pattern: '^\d{3}$'
          description: Exactly 3 digits
          example: "123"
        account_number:
          type: string
          pattern: '^\d{7}$'
          description: Exactly 7 digits
          example: "1234567"
        account_holder_kana:
          type: string
          pattern: '^[\u30A1-\u30F3\s]{0,50}$'
          description: Account holder name in katakana (optional, up to 50 characters)
          example: "\u30E4\u30DE\u30C0\u30BF\u30ED\u30A6"

    BankFields_AUD:
      type: object
      title: "AUD Bank Fields"
      description: Required fields when currency is AUD
      required: [bsb, account_number]
      properties:
        bsb:
          type: string
          pattern: '^\d{3}-?\d{3}$'
          description: Bank State Branch — 6 digits, optional dash (e.g. 062000 or 062-000)
          example: "062000"
        account_number:
          type: string
          pattern: '^\d{6,10}$'
          description: 6 to 10 digits
          example: "12345678"

    BankFields_CAD:
      type: object
      title: "CAD Bank Fields"
      description: Required fields when currency is CAD
      required: [institution_number, transit_number]
      properties:
        institution_number:
          type: string
          pattern: '^\d{3}$'
          description: Exactly 3 digits
          example: "001"
        transit_number:
          type: string
          pattern: '^\d{5}$'
          description: Exactly 5 digits
          example: "12345"
        account_number:
          type: string
          pattern: '^\d{7,12}$'
          description: 7 to 12 digits (optional)
          example: "1234567"

    BankFields_CHF:
      type: object
      title: "CHF Bank Fields"
      description: Required fields when currency is CHF
      required: [iban]
      properties:
        iban:
          type: string
          pattern: '^CH\d{2}[0-9]{5}[A-Z0-9]{12}$'
          description: Swiss IBAN — CH + 2 check digits + 5 bank digits + 12 account chars (21 total)
          example: "CH5604835012345678009"
        swift:
          type: string
          pattern: '^[A-Z]{4}CH[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: SWIFT/BIC code for Swiss bank (optional)
          example: "UBSWCHZH80A"

    BankFields_CNH:
      type: object
      title: "CNH Bank Fields"
      description: Required fields when currency is CNH (offshore Chinese yuan)
      required: [account_number, bank_name]
      properties:
        account_number:
          type: string
          pattern: '^\d{10,20}$'
          description: 10 to 20 digits
          example: "12345678901234"
        bank_name:
          type: string
          description: Full name of the bank (supports Unicode)
          example: "Bank of China"
        swift:
          type: string
          pattern: '^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: SWIFT/BIC code (optional)
          example: "BKCHCNBJ"

    BankFields_HKD:
      type: object
      title: "HKD Bank Fields"
      description: Required fields when currency is HKD
      required: [bank_code, account_number]
      properties:
        bank_code:
          type: string
          pattern: '^\d{3}$'
          description: Exactly 3 digits
          example: "004"
        account_number:
          type: string
          pattern: '^\d{6,12}$'
          description: 6 to 12 digits
          example: "123456789"
        swift:
          type: string
          pattern: '^[A-Z]{4}HK[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: SWIFT/BIC code for Hong Kong bank (optional)
          example: "HSBCHKHHHKH"

    BankFields_NZD:
      type: object
      title: "NZD Bank Fields"
      description: Required fields when currency is NZD
      required: [bank_code, branch_code, account_number, suffix]
      properties:
        bank_code:
          type: string
          pattern: '^\d{2}$'
          description: Exactly 2 digits
          example: "01"
        branch_code:
          type: string
          pattern: '^\d{4}$'
          description: Exactly 4 digits
          example: "0142"
        account_number:
          type: string
          pattern: '^\d{7}$'
          description: Exactly 7 digits
          example: "0000035"
        suffix:
          type: string
          pattern: '^\d{2,3}$'
          description: 2 to 3 digits
          example: "00"

    SuccessResponse:
      type: object
      required: [success, referenceNumber, message]
      properties:
        success:
          type: boolean
        referenceNumber:
          type: string
          example: "ACL-M5X2K1-AB3C"
        message:
          type: string

    ValidationErrorResponse:
      type: object
      required: [success, message, errors]
      properties:
        success:
          type: boolean
        message:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    FieldError:
      type: object
      required: [field, code, message]
      properties:
        field:
          type: string
          example: "step2.email"
        code:
          type: string
          example: "invalid_string"
        message:
          type: string
          example: "Invalid email address."

    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    DocumentMetadata:
      type: object
      required: [id, originalFileName, contentType, size, storageBucket, storageKey, uploadedBy, uploadedAt, status]
      properties:
        id:
          type: string
          example: "3f2504e0-4f89-11d3-9a0c-0305e82c3301"
        originalFileName:
          type: string
          example: "contract.pdf"
        contentType:
          type: string
          example: "application/pdf"
        size:
          type: integer
          format: int64
          example: 204800
        storageBucket:
          type: string
          example: "documents"
        storageKey:
          type: string
          example: "2026/03/19/3f2504e0-contract.pdf"
        uploadedBy:
          type: string
          example: "anonymous"
        uploadedAt:
          type: string
          example: "2026-03-19T10:00:00Z"
        status:
          type: string
          example: "active"
        referenceNumber:
          type: string
          nullable: true
          description: Claim reference number this document belongs to, if provided at upload
          example: "ACL-M5X2K1-AB3C"
        documentType:
          type: string
          nullable: true
          description: UI-supplied document label (e.g. passport, bank_statement)
          example: "bank_statement"

    DocumentUploadResponse:
      type: object
      required: [success, document]
      properties:
        success:
          type: boolean
        document:
          $ref: "#/components/schemas/DocumentMetadata"

    DocumentListResponse:
      type: object
      required: [success, documents, total]
      properties:
        success:
          type: boolean
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentMetadata"
        total:
          type: integer

    ClaimDocumentRequest:
      type: object
      required: [referenceNumber, lastName]
      properties:
        referenceNumber:
          type: string
          description: Claim reference number (format ACL-XXXXXX-XXXX)
          example: "ACL-TC6BUB-1CF5"
        lastName:
          type: string
          description: Last name of the claimant as submitted
          example: "Smith"
        dateOfBirth:
          type: string
          description: Optional date of birth for extra identity verification (YYYY-MM-DD)
          example: "1980-05-15"

    ClaimDocumentListResponse:
      type: object
      required: [success, referenceNumber, documents, total]
      properties:
        success:
          type: boolean
        referenceNumber:
          type: string
          example: "ACL-TC6BUB-1CF5"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentMetadata"
        total:
          type: integer

    # ── Store Locator schemas ────────────────────────────────────────────────

    StoreLocatorConfig:
      type: object
      required: [styleUrl, defaultCenter, defaultZoom, attribution]
      properties:
        styleUrl:
          type: string
          description: MapLibre-compatible tile style URL
          example: "https://tiles.openfreemap.org/styles/liberty"
        defaultCenter:
          type: object
          required: [lat, lng]
          properties:
            lat:
              type: number
              format: double
              example: 39.8283
            lng:
              type: number
              format: double
              example: -98.5795
        defaultZoom:
          type: integer
          example: 4
        attribution:
          type: string
          example: "© OpenFreeMap © OpenStreetMap contributors"

    FilterOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
          example: "branch"
        label:
          type: string
          example: "Branch"

    RadiusOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: integer
          description: Radius in kilometres
          example: 25
        label:
          type: string
          example: "25 km"

    StoreLocatorFilters:
      type: object
      required: [storeTypes, services, radiusOptions]
      properties:
        storeTypes:
          type: array
          items:
            $ref: "#/components/schemas/FilterOption"
        services:
          type: array
          items:
            $ref: "#/components/schemas/FilterOption"
        radiusOptions:
          type: array
          items:
            $ref: "#/components/schemas/RadiusOption"

    DayHours:
      type: object
      required: [open, close, closed]
      properties:
        open:
          type: string
          description: Opening time in HH:MM (24-hour)
          example: "09:00"
        close:
          type: string
          description: Closing time in HH:MM (24-hour)
          example: "17:00"
        closed:
          type: boolean
          description: True if the location is closed all day
          example: false

    StoreHours:
      type: object
      required: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
      properties:
        monday:
          $ref: "#/components/schemas/DayHours"
        tuesday:
          $ref: "#/components/schemas/DayHours"
        wednesday:
          $ref: "#/components/schemas/DayHours"
        thursday:
          $ref: "#/components/schemas/DayHours"
        friday:
          $ref: "#/components/schemas/DayHours"
        saturday:
          $ref: "#/components/schemas/DayHours"
        sunday:
          $ref: "#/components/schemas/DayHours"

    StoreAddress:
      type: object
      required: [line1, city, state, postalCode, country]
      properties:
        line1:
          type: string
          example: "100 Broadway"
        line2:
          type: string
          nullable: true
          example: "Suite 200"
        city:
          type: string
          example: "New York"
        state:
          type: string
          example: "NY"
        postalCode:
          type: string
          example: "10005"
        country:
          type: string
          example: "US"

    StoreWithDistance:
      type: object
      required: [id, name, storeType, address, latitude, longitude, phone, hours, services, distance, openNow]
      properties:
        id:
          type: string
          description: URL-safe unique identifier
          example: "nyc-001"
        name:
          type: string
          example: "Manhattan Financial District Branch"
        storeType:
          type: string
          enum: [branch, service_center, atm]
          example: "branch"
        address:
          $ref: "#/components/schemas/StoreAddress"
        latitude:
          type: number
          format: double
          example: 40.7074
        longitude:
          type: number
          format: double
          example: -74.0113
        phone:
          type: string
          example: "+1-212-555-0101"
        hours:
          $ref: "#/components/schemas/StoreHours"
        services:
          type: array
          items:
            type: string
          example: [notary, wire_transfer, financial_advisor]
        distance:
          type: number
          format: double
          description: Haversine distance in kilometres from the search origin. `0` when no origin was provided.
          example: 2.4
        openNow:
          type: boolean
          description: Whether the store is currently open, computed from the store's local timezone.
          example: true

    StoreSearchRequest:
      type: object
      description: All fields are optional. Omitting everything returns all stores sorted alphabetically.
      properties:
        query:
          type: string
          description: |
            Free-text input. Behaviour depends on the other fields present:
            - **With lat/lng (GPS)** — applied as a case-insensitive text filter on top of the radius.
            - **With `radiusKm`, no lat/lng** — treated as a place name; geocoded via Nominatim to
              get coordinates, then the explicit radius is applied. Text matching is skipped.
            - **Without `radiusKm`, no lat/lng** — geocoded, then radii of 25 → 50 → 100 km are
              tried in order until results are found. Falls back to plain text match if all fail.
          example: "Manhattan"
        latitude:
          type: number
          format: double
          description: Search origin latitude (WGS84). Required for distance-based sorting and radius filtering.
          example: 40.7128
        longitude:
          type: number
          format: double
          description: Search origin longitude (WGS84). Required for distance-based sorting and radius filtering.
          example: -74.0060
        radiusKm:
          type: number
          format: double
          description: |
            Maximum distance from the search origin in kilometres.
            - When omitted and `query` is provided without lat/lng, the backend automatically
              tries 25 → 50 → 100 km until results are found.
            - When omitted with lat/lng (GPS), no radius limit is applied.
            - Ignored when neither coordinates nor a geocodable query are available.
          example: 25
        storeTypes:
          type: array
          description: Store must match one of the supplied types (OR logic within the array).
          items:
            type: string
            enum: [branch, service_center, atm]
          example: [branch, service_center]
        services:
          type: array
          description: Store must offer all of the supplied services (AND logic).
          items:
            type: string
            enum: [notary, safe_deposit, currency_exchange, wire_transfer, financial_advisor, document_printing]
          example: [notary, wire_transfer]
        openNow:
          type: boolean
          description: When true, only stores that are currently open (in their local timezone) are returned.
          example: true

    StoreSearchResponse:
      type: object
      required: [stores, totalCount]
      properties:
        stores:
          type: array
          items:
            $ref: "#/components/schemas/StoreWithDistance"
        totalCount:
          type: integer
          description: Total number of stores matching the search criteria
          example: 5
