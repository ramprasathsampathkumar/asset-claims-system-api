openapi: 3.0.3
info:
  title: Asset Claims API
  description: Production-ready asset claims submission API
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Claims
  - name: Documents
  - name: Health

paths:
  /api/documents/upload:
    post:
      tags: [Documents]
      summary: Upload a document (PDF, DOC, DOCX, PNG, JPG — max 10 MB)
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: true
              properties:
                file:
                  type: string
                  description: The file to upload (binary)
                uploadedBy:
                  type: string
                  description: Optional identifier of the uploader (e.g. user ID or email)
                referenceNumber:
                  type: string
                  description: Optional claim reference number for traceability (e.g. ACL-XXXXX-XXXX)
                  example: "ACL-M5X2K1-AB3C"
                documentType:
                  type: string
                  description: Optional UI-supplied document label (e.g. passport, bank_statement, proof_of_address)
                  example: "bank_statement"
      responses:
        "201":
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentUploadResponse"
        "400":
          description: Validation failed (bad file type, size exceeded, missing file)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents:
    get:
      tags: [Documents]
      summary: List all uploaded documents
      operationId: listDocuments
      responses:
        "200":
          description: List of document metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{id}/download:
    get:
      tags: [Documents]
      summary: Download a document by ID
      operationId: downloadDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content with appropriate Content-Type
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/documents/{id}:
    delete:
      tags: [Documents]
      summary: Delete a document by ID
      operationId: deleteDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Document deleted successfully
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db:
                    type: string
                  timestamp:
                    type: string

  /api/inquiry:
    post:
      tags: [Claims]
      summary: Inquire about an existing claim status
      operationId: inquireClaim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimInquiry"
      responses:
        "200":
          description: Claim found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
        "404":
          description: Claim not found or details do not match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/submit:
    post:
      tags: [Claims]
      summary: Submit an asset claim
      operationId: submitClaim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSubmission"
      responses:
        "200":
          description: Claim submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:

    ClaimInquiry:
      type: object
      description: |
        Claim inquiry request. All field validation (required, format, pattern)
        is enforced in application code to allow locale-aware error messages.
      properties:
        referenceNumber:
          type: string
          description: Reference number returned at claim submission (format ACL-XXXXXX-XXXX)
          example: "ACL-M5X2K1-AB3C"
        lastName:
          type: string
          description: Last name of the claimant as submitted
          example: "Doe"
        dateOfBirth:
          type: string
          description: Optional date of birth for extra identity verification (YYYY-MM-DD)
          example: "1985-06-15"
        locale:
          type: string
          description: BCP 47 language tag for localised error messages
          example: "en"

    InquiryResponse:
      type: object
      required: [success, referenceNumber, status]
      properties:
        success:
          type: boolean
        referenceNumber:
          type: string
          example: "ACL-M5X2K1-AB3C"
        status:
          type: string
          description: Current claim status
          example: "SUBMITTED"
        locale:
          type: string
          example: "en"
        submittedAt:
          type: string
          description: ISO 8601 timestamp of when the claim was submitted
          example: "2026-03-01T10:30:00Z"
        assetType:
          type: string
          description: Type of asset claimed
          example: "stock"
        currency:
          type: string
          description: Requested payment currency
          example: "USD"
        createdAt:
          type: string
          description: ISO 8601 timestamp of record creation
        updatedAt:
          type: string
          description: ISO 8601 timestamp of last update

    ClaimSubmission:
      type: object
      required: [locale, submittedAt, step1, step2, step3, step4]
      properties:
        locale:
          type: string
          description: BCP 47 language tag
          example: "en"
        submittedAt:
          type: string
          format: date-time
          description: ISO 8601 submission timestamp
          example: "2026-03-01T10:30:00Z"
        step1:
          $ref: "#/components/schemas/Step1"
        step2:
          $ref: "#/components/schemas/Step2"
        step3:
          $ref: "#/components/schemas/Step3"
        step4:
          $ref: "#/components/schemas/Step4"

    Step1:
      type: object
      required: [confirmed]
      properties:
        confirmed:
          type: boolean
          description: Must be true to proceed

    Step2:
      type: object
      required:
        - firstName
        - lastName
        - dateOfBirth
        - nationality
        - idType
        - idNumber
        - street1
        - city
        - postalCode
        - country
        - phone
        - email
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        dateOfBirth:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          example: "1985-06-15"
        nationality:
          type: string
          minLength: 1
        idType:
          type: string
          enum: [passport, national_id, drivers_license, residence_permit, other]
        idNumber:
          type: string
          minLength: 1
        street1:
          type: string
          minLength: 1
        street2:
          type: string
        city:
          type: string
          minLength: 1
        stateProvince:
          type: string
        postalCode:
          type: string
          minLength: 1
        country:
          type: string
          pattern: '^[A-Z]{2}$'
          example: "US"
        phone:
          type: string
          pattern: '^\+[1-9]\d{1,14}$'
          example: "+12125551234"
        email:
          type: string

    # step3 — discriminated union (assetType).
    # Vert.x validates this as an open object; assetType discrimination
    # is enforced in application code (Step3Validator).
    Step3:
      type: object
      required: [assetType]
      description: |
        Asset details. The assetType field drives which other fields are required:
        - stock / etf: tickerSymbol, exchange, sharesOwned
        - bond: isin, faceValue, maturityDate
        - mutual_fund: fundName, fundCode, unitsHeld
        - crypto: cryptoExchange, cryptoAccountId, cryptoAssetSymbol, cryptoAmount
        - savings: bankName, savingsAccountNumber, savingsBalance
      properties:
        assetType:
          type: string
          enum: [stock, etf, bond, mutual_fund, crypto, savings]
        tickerSymbol:
          type: string
        isin:
          type: string
          pattern: '^[A-Z]{2}[A-Z0-9]{9}[0-9]$'
        exchange:
          type: string
        sharesOwned:
          type: string
          pattern: '^\d+(\.\d+)?$'
        faceValue:
          type: string
          pattern: '^\d+(\.\d+)?$'
        maturityDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        fundName:
          type: string
        fundCode:
          type: string
        unitsHeld:
          type: string
          pattern: '^\d+(\.\d+)?$'
        cryptoExchange:
          type: string
        cryptoAccountId:
          type: string
        cryptoAssetSymbol:
          type: string
        cryptoAmount:
          type: string
          pattern: '^\d+(\.\d+)?$'
        bankName:
          type: string
        savingsAccountNumber:
          type: string
        savingsBalance:
          type: string
          pattern: '^\d+(\.\d+)?$'
      additionalProperties: true

    Step4:
      type: object
      required: [currency, bankFields]
      properties:
        currency:
          type: string
          enum: [USD, EUR, GBP, JPY, AUD, CAD, CHF, CNH, HKD, NZD]
          description: |
            Payment currency. The required `bankFields` depend on this value:
            - **USD** → `account_number` (4–17 digits), `routing_number` (9 digits)
            - **EUR** → `iban` (valid IBAN), `bic` (optional BIC/SWIFT)
            - **GBP** → `sort_code` (DD-DD-DD), `account_number` (8 digits)
            - **JPY** → `bank_code` (4 digits), `branch_code` (3 digits), `account_number` (7 digits)
            - **AUD** → `bsb` (6 digits, dash optional), `account_number` (6–10 digits)
            - **CAD** → `institution_number` (3 digits), `transit_number` (5 digits), `account_number` (7–12 digits, optional)
            - **CHF** → `iban` (CH + 2 check + 5 bank + 12 account = 21 chars), `swift` (optional)
            - **CNH** → `account_number` (10–20 digits), `bank_name`, `swift` (optional)
            - **HKD** → `bank_code` (3 digits), `account_number` (6–12 digits), `swift` (optional)
            - **NZD** → `bank_code` (2 digits), `branch_code` (4 digits), `account_number` (7 digits), `suffix` (2–3 digits)
        bankFields:
          type: object
          additionalProperties: true
          description: >
            Currency-specific bank account fields. Required keys and formats are
            validated server-side based on the selected `currency`. See the
            `BankFields_*` schemas below for the exact structure per currency.

    # ── Per-currency bankFields schemas (documentation + Swagger UI) ─────────

    BankFields_USD:
      type: object
      title: "USD Bank Fields"
      description: Required fields when currency is USD
      required: [account_number, routing_number]
      properties:
        account_number:
          type: string
          pattern: '^\d{4,17}$'
          description: 4 to 17 digits
          example: "123456789"
        routing_number:
          type: string
          pattern: '^\d{9}$'
          description: Exactly 9 digits (ABA routing number)
          example: "021000021"

    BankFields_EUR:
      type: object
      title: "EUR Bank Fields"
      description: Required fields when currency is EUR
      required: [iban]
      properties:
        iban:
          type: string
          pattern: '^[A-Z]{2}\d{2}[A-Z0-9]{4,30}$'
          description: Valid IBAN (minimum 4 alphanumeric chars after check digits)
          example: "DE89370400440532013000"
        bic:
          type: string
          pattern: '^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: BIC / SWIFT code (optional)
          example: "COBADEFFXXX"

    BankFields_GBP:
      type: object
      title: "GBP Bank Fields"
      description: Required fields when currency is GBP
      required: [sort_code, account_number]
      properties:
        sort_code:
          type: string
          pattern: '^\d{2}-\d{2}-\d{2}$'
          description: "Format: DD-DD-DD"
          example: "40-30-20"
        account_number:
          type: string
          pattern: '^\d{8}$'
          description: Exactly 8 digits
          example: "12345678"

    BankFields_JPY:
      type: object
      title: "JPY Bank Fields"
      description: Required fields when currency is JPY
      required: [bank_code, branch_code, account_number]
      properties:
        bank_code:
          type: string
          pattern: '^\d{4}$'
          description: Exactly 4 digits
          example: "0001"
        branch_code:
          type: string
          pattern: '^\d{3}$'
          description: Exactly 3 digits
          example: "123"
        account_number:
          type: string
          pattern: '^\d{7}$'
          description: Exactly 7 digits
          example: "1234567"
        account_holder_kana:
          type: string
          pattern: '^[\u30A1-\u30F3\s]{0,50}$'
          description: Account holder name in katakana (optional, up to 50 characters)
          example: "\u30E4\u30DE\u30C0\u30BF\u30ED\u30A6"

    BankFields_AUD:
      type: object
      title: "AUD Bank Fields"
      description: Required fields when currency is AUD
      required: [bsb, account_number]
      properties:
        bsb:
          type: string
          pattern: '^\d{3}-?\d{3}$'
          description: Bank State Branch — 6 digits, optional dash (e.g. 062000 or 062-000)
          example: "062000"
        account_number:
          type: string
          pattern: '^\d{6,10}$'
          description: 6 to 10 digits
          example: "12345678"

    BankFields_CAD:
      type: object
      title: "CAD Bank Fields"
      description: Required fields when currency is CAD
      required: [institution_number, transit_number]
      properties:
        institution_number:
          type: string
          pattern: '^\d{3}$'
          description: Exactly 3 digits
          example: "001"
        transit_number:
          type: string
          pattern: '^\d{5}$'
          description: Exactly 5 digits
          example: "12345"
        account_number:
          type: string
          pattern: '^\d{7,12}$'
          description: 7 to 12 digits (optional)
          example: "1234567"

    BankFields_CHF:
      type: object
      title: "CHF Bank Fields"
      description: Required fields when currency is CHF
      required: [iban]
      properties:
        iban:
          type: string
          pattern: '^CH\d{2}[0-9]{5}[A-Z0-9]{12}$'
          description: Swiss IBAN — CH + 2 check digits + 5 bank digits + 12 account chars (21 total)
          example: "CH5604835012345678009"
        swift:
          type: string
          pattern: '^[A-Z]{4}CH[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: SWIFT/BIC code for Swiss bank (optional)
          example: "UBSWCHZH80A"

    BankFields_CNH:
      type: object
      title: "CNH Bank Fields"
      description: Required fields when currency is CNH (offshore Chinese yuan)
      required: [account_number, bank_name]
      properties:
        account_number:
          type: string
          pattern: '^\d{10,20}$'
          description: 10 to 20 digits
          example: "12345678901234"
        bank_name:
          type: string
          description: Full name of the bank (supports Unicode)
          example: "Bank of China"
        swift:
          type: string
          pattern: '^[A-Z]{4}[A-Z]{2}[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: SWIFT/BIC code (optional)
          example: "BKCHCNBJ"

    BankFields_HKD:
      type: object
      title: "HKD Bank Fields"
      description: Required fields when currency is HKD
      required: [bank_code, account_number]
      properties:
        bank_code:
          type: string
          pattern: '^\d{3}$'
          description: Exactly 3 digits
          example: "004"
        account_number:
          type: string
          pattern: '^\d{6,12}$'
          description: 6 to 12 digits
          example: "123456789"
        swift:
          type: string
          pattern: '^[A-Z]{4}HK[A-Z0-9]{2}([A-Z0-9]{3})?$'
          description: SWIFT/BIC code for Hong Kong bank (optional)
          example: "HSBCHKHHHKH"

    BankFields_NZD:
      type: object
      title: "NZD Bank Fields"
      description: Required fields when currency is NZD
      required: [bank_code, branch_code, account_number, suffix]
      properties:
        bank_code:
          type: string
          pattern: '^\d{2}$'
          description: Exactly 2 digits
          example: "01"
        branch_code:
          type: string
          pattern: '^\d{4}$'
          description: Exactly 4 digits
          example: "0142"
        account_number:
          type: string
          pattern: '^\d{7}$'
          description: Exactly 7 digits
          example: "0000035"
        suffix:
          type: string
          pattern: '^\d{2,3}$'
          description: 2 to 3 digits
          example: "00"

    SuccessResponse:
      type: object
      required: [success, referenceNumber, message]
      properties:
        success:
          type: boolean
        referenceNumber:
          type: string
          example: "ACL-M5X2K1-AB3C"
        message:
          type: string

    ValidationErrorResponse:
      type: object
      required: [success, message, errors]
      properties:
        success:
          type: boolean
        message:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    FieldError:
      type: object
      required: [field, code, message]
      properties:
        field:
          type: string
          example: "step2.email"
        code:
          type: string
          example: "invalid_string"
        message:
          type: string
          example: "Invalid email address."

    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    DocumentMetadata:
      type: object
      required: [id, originalFileName, contentType, size, storageBucket, storageKey, uploadedBy, uploadedAt, status]
      properties:
        id:
          type: string
          example: "3f2504e0-4f89-11d3-9a0c-0305e82c3301"
        originalFileName:
          type: string
          example: "contract.pdf"
        contentType:
          type: string
          example: "application/pdf"
        size:
          type: integer
          format: int64
          example: 204800
        storageBucket:
          type: string
          example: "documents"
        storageKey:
          type: string
          example: "2026/03/19/3f2504e0-contract.pdf"
        uploadedBy:
          type: string
          example: "anonymous"
        uploadedAt:
          type: string
          example: "2026-03-19T10:00:00Z"
        status:
          type: string
          example: "active"
        referenceNumber:
          type: string
          nullable: true
          description: Claim reference number this document belongs to, if provided at upload
          example: "ACL-M5X2K1-AB3C"
        documentType:
          type: string
          nullable: true
          description: UI-supplied document label (e.g. passport, bank_statement)
          example: "bank_statement"

    DocumentUploadResponse:
      type: object
      required: [success, document]
      properties:
        success:
          type: boolean
        document:
          $ref: "#/components/schemas/DocumentMetadata"

    DocumentListResponse:
      type: object
      required: [success, documents, total]
      properties:
        success:
          type: boolean
        documents:
          type: array
          items:
            $ref: "#/components/schemas/DocumentMetadata"
        total:
          type: integer
